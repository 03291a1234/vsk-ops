# Deploys the API + frontend as a single Azure App Service (frontend built into wwwroot).
#
# One-time setup (Azure CLI):
#   az group create -n vsk-ops-rg -l centralindia
#   az appservice plan create -n vsk-ops-plan -g vsk-ops-rg --sku B1 --is-linux
#   az webapp create -n <your-app-name> -g vsk-ops-rg -p vsk-ops-plan --runtime "DOTNETCORE:8.0"
#   az postgres flexible-server create -n <your-pg-server> -g vsk-ops-rg \
#       --admin-user vskadmin --admin-password '<password>' \
#       --sku-name Standard_B1ms --tier Burstable --version 16 --database-name vskops \
#       --public-access 0.0.0.0   # allows Azure services (incl. the App Service) through the firewall
#   az webapp config appsettings set -n <your-app-name> -g vsk-ops-rg --settings \
#       ConnectionStrings__VskOps='Host=<your-pg-server>.postgres.database.azure.com;Database=vskops;Username=vskadmin;Password=<password>;SSL Mode=Require' \
#       Jwt__Key='<random 32+ chars>' \
#       Database__MigrateOnStartup=true
#
# Then add repo secrets (Settings → Secrets and variables → Actions):
#   AZURE_WEBAPP_NAME            — the app service name
#   AZURE_WEBAPP_PUBLISH_PROFILE — from: az webapp deployment list-publishing-profiles \
#                                        -n <your-app-name> -g vsk-ops-rg --xml
#
# Trigger manually from the Actions tab (workflow_dispatch), or change `on:` to
# push once you're happy with it.
name: Deploy to Azure

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Publish API with frontend in wwwroot
        run: |
          dotnet publish src/VskOps.Api -c Release -o publish
          cp -r frontend/dist/. publish/wwwroot/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
