# Split deployment: API on a Windows App Service, frontend on a Linux App Service.
#
# The API needs these app settings on its App Service (Configuration → Application settings):
#   ConnectionStrings__VskOps  — the Azure SQL connection string
#   Jwt__Key                   — random string, 32+ chars
#   Database__MigrateOnStartup — true
#   Cors__AllowedOrigins__0    — https://<frontend-app>.azurewebsites.net
#
# The frontend Linux app serves the static build with:  pm2 serve /home/site/wwwroot --no-daemon --spa
# (set once as the app's Startup Command). VITE_API_URL is baked in at build time below.
#
# Repo secrets required (Settings → Secrets and variables → Actions):
#   AZURE_API_APP_NAME / AZURE_API_PUBLISH_PROFILE   — Windows App Service (API)
#   AZURE_WEB_APP_NAME / AZURE_WEB_PUBLISH_PROFILE   — Linux App Service (frontend)
#   API_URL                                          — https://<api-app>.azurewebsites.net
name: Deploy to Azure

on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish API
        run: dotnet publish src/VskOps.Api -c Release -o publish

      - name: Deploy to Windows App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: publish

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend against the API origin
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Linux App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEB_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: frontend/dist
